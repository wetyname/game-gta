<!DOCTYPE html>
<html>
<head>
    <title>GTA Electron Game</title>
    <style>
        body { margin:0; overflow:hidden; background:black; }
        #hud {
            position:absolute;
            top:10px;
            left:10px;
            color:white;
            font-family:Arial;
        }
        #crosshair {
            position:absolute;
            top:50%;
            left:50%;
            width:8px;
            height:8px;
            background:white;
            transform:translate(-50%,-50%);
        }
    </style>
</head>
<body>

<div id="hud">❤️ 100 | 🔫 10</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ===== СЦЕНА =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== СВЕТ =====
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// ===== ПОЛ =====
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshStandardMaterial({color:0x1e293b})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// ===== ИГРОК =====
const player = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({color:"green"})
);
player.position.y = 1;
scene.add(player);

// ===== УПРАВЛЕНИЕ =====
let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// ===== КАМЕРА =====
let rot = 0;

document.body.onclick = () => document.body.requestPointerLock();

document.addEventListener("mousemove", e=>{
    if(document.pointerLockElement){
        rot -= e.movementX * 0.002;
    }
});

// ===== ЗДОРОВЬЕ =====
let health = 100;
let ammo = 10;

const hud = document.getElementById("hud");

// ===== ВРАГИ =====
let enemies = [];

function spawnEnemy(){
    const e = new THREE.Mesh(
        new THREE.BoxGeometry(1,2,1),
        new THREE.MeshStandardMaterial({color:"red"})
    );

    e.position.set(Math.random()*50-25,1,Math.random()*50-25);
    scene.add(e);
    enemies.push(e);
}

setInterval(spawnEnemy, 2000);

// ===== ПУЛИ =====
let bullets = [];

function shoot(){
    if(ammo <= 0) return;
    ammo--;

    const b = new THREE.Mesh(
        new THREE.SphereGeometry(0.2),
        new THREE.MeshBasicMaterial({color:"yellow"})
    );

    b.position.copy(player.position);

    b.velocity = new THREE.Vector3(
        Math.sin(rot),
        0,
        Math.cos(rot)
    ).multiplyScalar(1);

    scene.add(b);
    bullets.push(b);
}

document.addEventListener("mousedown", shoot);

// ===== МАШИНЫ (простые) =====
let cars = [];

function spawnCar(){
    const c = new THREE.Mesh(
        new THREE.BoxGeometry(2,1,4),
        new THREE.MeshStandardMaterial({color:"blue"})
    );

    c.position.set(Math.random()*50-25,0.5,Math.random()*50-25);
    c.speed = 0;

    scene.add(c);
    cars.push(c);
}

setInterval(spawnCar, 5000);

// ===== ИГРОВОЙ ЦИКЛ =====
function animate(){
    requestAnimationFrame(animate);

    let speed = keys["shift"] ? 0.2 : 0.1;

    let forward = new THREE.Vector3(Math.sin(rot),0,Math.cos(rot));

    if(keys["w"]) player.position.add(forward.clone().multiplyScalar(speed));
    if(keys["s"]) player.position.add(forward.clone().multiplyScalar(-speed));

    player.rotation.y = rot;

    camera.position.set(
        player.position.x + Math.sin(rot)*6,
        player.position.y + 3,
        player.position.z + Math.cos(rot)*6
    );

    camera.lookAt(player.position);

    // ===== ПУЛИ =====
    bullets.forEach((b,i)=>{
        b.position.add(b.velocity);

        enemies.forEach((e,ei)=>{
            if(b.position.distanceTo(e.position) < 1){
                scene.remove(e);
                enemies.splice(ei,1);

                scene.remove(b);
                bullets.splice(i,1);
            }
        });
    });

    // ===== ВРАГИ =====
    enemies.forEach(e=>{
        const dx = player.position.x - e.position.x;
        const dz = player.position.z - e.position.z;

        e.position.x += dx * 0.01;
        e.position.z += dz * 0.01;

        if(e.position.distanceTo(player.position) < 1.5){
            health -= 0.2;
        }
    });

    hud.innerHTML = `❤️ ${Math.floor(health)} | 🔫 ${ammo}`;

    renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
