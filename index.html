<!DOCTYPE html>
<html>
<head>
    <title>Cyber City Electron</title>
    <style>
        body { margin:0; overflow:hidden; background:black; }
        #hud { position:absolute; top:10px; left:10px; color:white; font-family:Arial; font-size:20px; text-shadow: 2px 2px black; }
        #crosshair { position:absolute; top:50%; left:50%; width:8px; height:8px; background:white; transform:translate(-50%,-50%); border-radius:50%; }
    </style>
</head>
<body>

<div id="hud">❤️ 100 | 🔫 10</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020617); // Темное небо

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// СВЕТ (добавил больше яркости для моделей)
const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(10, 20, 10);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040, 2));

const loader = new THREE.GLTFLoader();

// ДОРОГИ И ГОРОД
const roads = [];
for (let i = -3; i <= 3; i++) {
    const road = new THREE.Mesh(
        new THREE.PlaneGeometry(500, 15),
        new THREE.MeshStandardMaterial({color: 0x1e293b})
    );
    road.rotation.x = -Math.PI / 2;
    road.position.z = i * 50;
    scene.add(road);
    roads.push(i * 50);
}

// ТРАФИК (Машины)
let traffic = [];
function spawnTraffic() {
    loader.load('assets/models/car.glb', (gltf) => {
        const car = gltf.scene;
        car.scale.set(1.5, 1.5, 1.5); // Масштаб под твой пак
        car.position.set(-200, 0, roads[Math.floor(Math.random() * roads.length)]);
        car.userData.speed = 0.5 + Math.random();
        scene.add(car);
        traffic.push(car);
    });
}
// Создаем 10 машин для начала
for(let i=0; i<10; i++) setTimeout(spawnTraffic, i * 500);

// ИГРОК (Временно куб, пока не загрузишь персонажа)
const player = new THREE.Group();
const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: "green"}));
player.add(body);
player.position.y = 1;
scene.add(player);

// УПРАВЛЕНИЕ
let keys = {};
let rot = 0;
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
document.body.onclick = () => document.body.requestPointerLock();
document.addEventListener("mousemove", e => { if(document.pointerLockElement) rot -= e.movementX * 0.002; });

function animate() {
    requestAnimationFrame(animate);

    // ДВИЖЕНИЕ ИГРОКА
    let speed = keys["shift"] ? 0.4 : 0.2;
    let forward = new THREE.Vector3(Math.sin(rot), 0, Math.cos(rot));
    if(keys["w"]) player.position.add(forward.clone().multiplyScalar(speed));
    if(keys["s"]) player.position.add(forward.clone().multiplyScalar(-speed));
    player.rotation.y = rot;

    // КАМЕРА (За спиной)
    camera.position.set(player.position.x + Math.sin(rot)*8, player.position.y + 4, player.position.z + Math.cos(rot)*8);
    camera.lookAt(player.position);

    // ДВИЖЕНИЕ ТРАФИКА
    traffic.forEach(car => {
        car.position.x += car.userData.speed;
        if(car.position.x > 250) car.position.x = -250; // Зацикливание
        
        // Если игрок близко к машине — можно "сесть" (упрощенно)
        if(player.position.distanceTo(car.position) < 3 && keys["f"]) {
            player.position.copy(car.position); // Игрок "прилипает" к машине
        }
    });

    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
